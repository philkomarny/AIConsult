<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1e35"/>
      <stop offset="100%" style="stop-color:#0a1225"/>
    </linearGradient>

    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="60%" style="stop-color:#a8c5d8"/>
      <stop offset="100%" style="stop-color:#5ba3c8"/>
    </linearGradient>

    <linearGradient id="gapGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.12"/>
      <stop offset="60%" style="stop-color:#a8c5d8;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#a8c5d8;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="napkinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8d5b8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#a8c5d8" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.5">
    <circle cx="55" cy="28" r="1.0" filter="url(#starGlow)"/>
    <circle cx="170" cy="50" r="0.7" filter="url(#starGlow)"/>
    <circle cx="310" cy="22" r="1.2" filter="url(#starGlow)"/>
    <circle cx="490" cy="38" r="0.8" filter="url(#starGlow)"/>
    <circle cx="630" cy="15" r="1.1" filter="url(#starGlow)"/>
    <circle cx="745" cy="45" r="0.9" filter="url(#starGlow)"/>
    <circle cx="125" cy="65" r="0.6" filter="url(#starGlow)"/>
    <circle cx="560" cy="58" r="0.7" filter="url(#starGlow)"/>
    <circle cx="700" cy="70" r="1.0" filter="url(#starGlow)"/>
  </g>

  <!-- Central glow -->
  <rect width="800" height="400" fill="url(#centerGlow)"/>

  <!-- THE INCOMPLETE CIRCLE — the degree almost finished -->
  <!-- Main arc — about 330 degrees, gap at the top-right -->
  <!-- The arc represents 42/48 credits completed (87.5%) — gap is the missing piece -->
  <circle cx="400" cy="200" r="120" fill="none" stroke="url(#arcGrad)" stroke-width="3"
          stroke-dasharray="680 75" stroke-dashoffset="-40" opacity="0.7" filter="url(#glow)"/>

  <!-- Inner echo arc -->
  <circle cx="400" cy="200" r="105" fill="none" stroke="#a8c5d8" stroke-width="1"
          stroke-dasharray="595 65" stroke-dashoffset="-35" opacity="0.15"/>

  <!-- Outer echo arc -->
  <circle cx="400" cy="200" r="135" fill="none" stroke="#d4a574" stroke-width="0.8"
          stroke-dasharray="765 85" stroke-dashoffset="-45" opacity="0.12"/>

  <!-- THE GAP — luminous, alive, waiting -->
  <!-- Particles streaming toward the gap from outside -->
  <g fill="#d4a574" opacity="0.4">
    <circle cx="505" cy="105" r="2.5" filter="url(#glow)">
      <animate attributeName="cx" values="540;510;540" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;100;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="95" r="1.8" filter="url(#glow)">
      <animate attributeName="cx" values="555;515;555" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;98;70" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="110" r="2" filter="url(#glow)">
      <animate attributeName="cx" values="530;495;530" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="75;108;75" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.45;0.08" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="510" cy="100" r="1.5">
      <animate attributeName="cx" values="548;505;548" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="68;105;68" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.35;0.05" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Small scattered dots representing the 42 million — a constellation of stopped journeys -->
  <g fill="#a8c5d8" opacity="0.2">
    <circle cx="120" cy="140" r="1.5">
      <animate attributeName="opacity" values="0.2;0.08;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="260" r="1.2">
      <animate attributeName="opacity" values="0.15;0.06;0.15" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="200" r="1.8">
      <animate attributeName="opacity" values="0.18;0.05;0.18" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="150" r="1.3">
      <animate attributeName="opacity" values="0.2;0.07;0.2" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="710" cy="250" r="1.6">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="310" r="1.2">
      <animate attributeName="opacity" values="0.18;0.06;0.18" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="330" r="1.4">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="90" r="1.0">
      <animate attributeName="opacity" values="0.2;0.08;0.2" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Faint paths from scattered dots toward the circle — people trying to return -->
  <g stroke="#a8c5d8" stroke-width="0.5" fill="none" opacity="0.08">
    <path d="M120,140 Q260,170 280,200" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M680,150 Q560,175 520,200" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M155,260 Q270,230 285,210" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="5.5s" repeatCount="indefinite"/>
    </path>
    <path d="M710,250 Q560,225 520,210" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="4.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- THE NAPKIN — small, warm, tilted, in the lower portion -->
  <g transform="translate(400, 320) rotate(-8)">
    <rect x="-35" y="-25" width="70" height="50" rx="2" fill="url(#napkinGlow)" stroke="#d4a574" stroke-width="0.5" opacity="0.5"/>
    <!-- Handwritten line on napkin -->
    <line x1="-20" y1="-8" x2="22" y2="-8" stroke="#d4a574" stroke-width="0.8" opacity="0.3"/>
    <line x1="-18" y1="0" x2="15" y2="0" stroke="#d4a574" stroke-width="0.6" opacity="0.2"/>
    <!-- Warm glow beneath napkin -->
    <ellipse cx="0" cy="30" rx="45" ry="12" fill="#d4a574" opacity="0.04"/>
  </g>

  <!-- Neural network nodes — AI bridging the gap -->
  <g>
    <circle cx="490" cy="95" r="4.5" fill="#0a1628" stroke="#d4a574" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="490" cy="95" r="2.2" fill="#d4a574" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="520" cy="115" r="3.5" fill="#0a1628" stroke="#a8c5d8" stroke-width="1.2" filter="url(#glow)"/>
    <circle cx="520" cy="115" r="1.8" fill="#a8c5d8" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="475" cy="120" r="3" fill="#0a1628" stroke="#d4a574" stroke-width="1" filter="url(#glow)"/>
    <circle cx="475" cy="120" r="1.5" fill="#d4a574" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connections between AI nodes near the gap -->
  <g stroke-width="0.8" fill="none" opacity="0.18">
    <path d="M490,95 Q505,105 520,115" stroke="#a8c5d8" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;-12" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M475,120 Q483,108 490,95" stroke="#d4a574" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;-12" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M475,120 Q498,118 520,115" stroke="#a8c5d8" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;-12" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Ambient floating particles -->
  <g fill="#a8c5d8" opacity="0.2">
    <circle cx="80" cy="350" r="1.3">
      <animate attributeName="cy" values="350;342;350" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="360" r="1.0">
      <animate attributeName="cy" values="360;354;360" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#d4a574" opacity="0.15">
    <circle cx="200" cy="80" r="1.0">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="340" r="1.3">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner accents -->
  <g stroke="#a8c5d8" stroke-width="1" fill="none" opacity="0.12">
    <path d="M25,25 L25,55 M25,25 L55,25"/>
    <path d="M775,25 L775,55 M775,25 L745,25"/>
    <path d="M25,375 L25,345 M25,375 L55,375"/>
    <path d="M775,375 L775,345 M775,375 L745,375"/>
  </g>
</svg>