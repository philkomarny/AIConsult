<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1e35"/>
      <stop offset="100%" style="stop-color:#0a1225"/>
    </linearGradient>

    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8c5d8;stop-opacity:0.15"/>
      <stop offset="45%" style="stop-color:#a8c5d8;stop-opacity:0.4"/>
      <stop offset="55%" style="stop-color:#d4a574;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0.2"/>
    </linearGradient>

    <radialGradient id="nowGlow" cx="50%" cy="53%" r="35%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#d4a574;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#a8c5d8" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  <rect width="400" height="300" fill="url(#grid)"/>

  <!-- Central glow -->
  <ellipse cx="200" cy="160" rx="100" ry="80" fill="url(#nowGlow)"/>

  <!-- Timeline -->
  <line x1="30" y1="160" x2="370" y2="160" stroke="url(#timelineGrad)" stroke-width="1.2" opacity="0.5"/>

  <!-- Past ticks, compressing -->
  <g stroke="#a8c5d8" stroke-width="0.8" opacity="0.2">
    <line x1="50" y1="155" x2="50" y2="165"/>
    <line x1="80" y1="155" x2="80" y2="165"/>
    <line x1="115" y1="155" x2="115" y2="165"/>
    <line x1="145" y1="155" x2="145" y2="165"/>
    <line x1="168" y1="155" x2="168" y2="165"/>
    <line x1="183" y1="155" x2="183" y2="165"/>
    <line x1="193" y1="155" x2="193" y2="165"/>
  </g>

  <!-- Future ticks, expanding -->
  <g stroke="#d4a574" stroke-width="0.8" opacity="0.15">
    <line x1="207" y1="155" x2="207" y2="165"/>
    <line x1="217" y1="155" x2="217" y2="165"/>
    <line x1="232" y1="155" x2="232" y2="165"/>
    <line x1="255" y1="155" x2="255" y2="165"/>
    <line x1="285" y1="155" x2="285" y2="165"/>
    <line x1="320" y1="155" x2="320" y2="165"/>
    <line x1="350" y1="155" x2="350" y2="165"/>
  </g>

  <!-- NOW point -->
  <circle cx="200" cy="160" r="6" fill="#d4a574" opacity="0.9" filter="url(#softGlow)">
    <animate attributeName="r" values="6;7.5;6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="3" fill="#d4a574" opacity="1"/>

  <!-- Past scattered dots -->
  <g fill="#a8c5d8">
    <circle cx="40" cy="90" r="1.2" opacity="0.15"/>
    <circle cx="60" cy="210" r="1.0" opacity="0.12"/>
    <circle cx="90" cy="120" r="1.4" opacity="0.18"/>
    <circle cx="110" cy="80" r="1.1" opacity="0.14"/>
    <circle cx="130" cy="220" r="1.3" opacity="0.16"/>
    <circle cx="160" cy="100" r="1.0" opacity="0.13"/>
    <circle cx="75" cy="250" r="0.9" opacity="0.10"/>
    <circle cx="140" cy="190" r="1.1" opacity="0.12"/>
  </g>

  <!-- Convergence lines -->
  <g stroke="#a8c5d8" stroke-width="0.4" opacity="0.08">
    <line x1="90" y1="120" x2="200" y2="160"/>
    <line x1="110" y1="80" x2="200" y2="160"/>
    <line x1="160" y1="100" x2="200" y2="160"/>
    <line x1="130" y1="220" x2="200" y2="160"/>
  </g>

  <!-- Data streams outward -->
  <g stroke="#d4a574" stroke-width="0.6" fill="none" opacity="0.25">
    <path d="M206,156 Q250,130 290,95" stroke-dasharray="3,5">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M206,160 Q260,150 320,130" stroke-dasharray="3,5">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M206,164 Q255,180 300,220" stroke-dasharray="3,5">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Future nodes -->
  <g>
    <circle cx="290" cy="95" r="3.5" fill="#0a1628" stroke="#d4a574" stroke-width="1.2" filter="url(#glow)"/>
    <circle cx="290" cy="95" r="1.8" fill="#d4a574" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="320" cy="130" r="3" fill="#0a1628" stroke="#d4a574" stroke-width="1" filter="url(#glow)"/>
    <circle cx="320" cy="130" r="1.5" fill="#d4a574" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="300" cy="220" r="3.2" fill="#0a1628" stroke="#d4a574" stroke-width="1.1" filter="url(#glow)"/>
    <circle cx="300" cy="220" r="1.6" fill="#d4a574" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.4;0.65" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Vertical pulse -->
  <line x1="200" y1="100" x2="200" y2="220" stroke="#d4a574" stroke-width="0.4" opacity="0.1"/>
</svg>