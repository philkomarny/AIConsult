<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1e35"/>
      <stop offset="100%" style="stop-color:#0a1225"/>
    </linearGradient>

    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8c5d8;stop-opacity:0.15"/>
      <stop offset="45%" style="stop-color:#a8c5d8;stop-opacity:0.4"/>
      <stop offset="55%" style="stop-color:#d4a574;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0.2"/>
    </linearGradient>

    <radialGradient id="nowGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#d4a574;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#a8c5d8" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Central convergence glow -->
  <ellipse cx="400" cy="300" rx="200" ry="160" fill="url(#nowGlow)"/>

  <!-- Timeline, collapsing toward center -->
  <line x1="60" y1="320" x2="740" y2="320" stroke="url(#timelineGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Past tick marks, spaced wide on left, compressing toward center -->
  <g stroke="#a8c5d8" stroke-width="1" opacity="0.2">
    <line x1="100" y1="312" x2="100" y2="328"/>
    <line x1="160" y1="312" x2="160" y2="328"/>
    <line x1="230" y1="312" x2="230" y2="328"/>
    <line x1="290" y1="312" x2="290" y2="328"/>
    <line x1="335" y1="312" x2="335" y2="328"/>
    <line x1="365" y1="312" x2="365" y2="328"/>
    <line x1="385" y1="312" x2="385" y2="328"/>
  </g>

  <!-- Future tick marks, expanding from center -->
  <g stroke="#d4a574" stroke-width="1" opacity="0.15">
    <line x1="415" y1="312" x2="415" y2="328"/>
    <line x1="435" y1="312" x2="435" y2="328"/>
    <line x1="465" y1="312" x2="465" y2="328"/>
    <line x1="510" y1="312" x2="510" y2="328"/>
    <line x1="570" y1="312" x2="570" y2="328"/>
    <line x1="640" y1="312" x2="640" y2="328"/>
    <line x1="700" y1="312" x2="700" y2="328"/>
  </g>

  <!-- The NOW point, center of convergence -->
  <circle cx="400" cy="320" r="8" fill="#d4a574" opacity="0.9" filter="url(#softGlow)">
    <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="320" r="4" fill="#d4a574" opacity="1"/>

  <!-- Past: scattered dots converging inward, the 42 million -->
  <g fill="#a8c5d8">
    <circle cx="80" cy="180" r="1.5" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="420" r="1.2" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.22;0.12" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="240" r="1.8" opacity="0.18">
      <animate attributeName="opacity" values="0.18;0.28;0.18" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="160" r="1.3" opacity="0.14">
      <animate attributeName="opacity" values="0.14;0.24;0.14" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="380" r="1.6" opacity="0.16">
      <animate attributeName="opacity" values="0.16;0.26;0.16" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="200" r="1.4" opacity="0.13">
      <animate attributeName="opacity" values="0.13;0.23;0.13" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="450" r="1.1" opacity="0.11"/>
    <circle cx="140" cy="290" r="1.0" opacity="0.10"/>
    <circle cx="280" cy="260" r="1.5" opacity="0.15"/>
    <circle cx="310" cy="400" r="1.2" opacity="0.12"/>
  </g>

  <!-- Convergence lines from past dots toward NOW -->
  <g stroke="#a8c5d8" stroke-width="0.5" opacity="0.08">
    <line x1="150" y1="240" x2="400" y2="320"/>
    <line x1="200" y1="160" x2="400" y2="320"/>
    <line x1="250" y1="200" x2="400" y2="320"/>
    <line x1="180" y1="380" x2="400" y2="320"/>
    <line x1="280" y1="260" x2="400" y2="320"/>
  </g>

  <!-- Data streams flowing from NOW outward to the future -->
  <g stroke="#d4a574" stroke-width="0.8" fill="none" opacity="0.25">
    <path d="M408,316 Q480,280 560,200" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M408,320 Q500,310 620,270" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M408,324 Q490,350 580,420" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M408,318 Q520,290 680,230" stroke-dasharray="4,6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Future outcome nodes -->
  <g>
    <circle cx="560" cy="200" r="5" fill="#0a1628" stroke="#d4a574" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="560" cy="200" r="2.5" fill="#d4a574" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="620" cy="270" r="4" fill="#0a1628" stroke="#d4a574" stroke-width="1.2" filter="url(#glow)"/>
    <circle cx="620" cy="270" r="2" fill="#d4a574" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="580" cy="420" r="4.5" fill="#0a1628" stroke="#d4a574" stroke-width="1.3" filter="url(#glow)"/>
    <circle cx="580" cy="420" r="2.2" fill="#d4a574" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.4;0.65" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="680" cy="230" r="3.5" fill="#0a1628" stroke="#d4a574" stroke-width="1" filter="url(#glow)"/>
    <circle cx="680" cy="230" r="1.8" fill="#d4a574" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Vertical pulse line through NOW -->
  <line x1="400" y1="180" x2="400" y2="460" stroke="#d4a574" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="280" x2="400" y2="360" stroke="#d4a574" stroke-width="1.2" opacity="0.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>