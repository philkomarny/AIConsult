<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1e35"/>
      <stop offset="100%" style="stop-color:#0a1225"/>
    </linearGradient>

    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="60%" style="stop-color:#a8c5d8"/>
      <stop offset="100%" style="stop-color:#5ba3c8"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.12"/>
      <stop offset="60%" style="stop-color:#a8c5d8;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#a8c5d8;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  <rect width="400" height="300" fill="url(#centerGlow)"/>

  <!-- The incomplete circle -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="url(#arcGrad)" stroke-width="2.5"
          stroke-dasharray="453 50" stroke-dashoffset="-28" opacity="0.7" filter="url(#glow)"/>

  <!-- Inner echo -->
  <circle cx="200" cy="150" r="68" fill="none" stroke="#a8c5d8" stroke-width="0.8"
          stroke-dasharray="385 43" stroke-dashoffset="-24" opacity="0.15"/>

  <!-- Particles streaming toward gap -->
  <g fill="#d4a574" opacity="0.4">
    <circle cx="260" cy="85" r="2" filter="url(#glow)">
      <animate attributeName="cx" values="280;258;280" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="65;88;65" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="248" cy="78" r="1.5" filter="url(#glow)">
      <animate attributeName="cx" values="272;250;272" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;80;60" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.4;0.05" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="255" cy="92" r="1.8" filter="url(#glow)">
      <animate attributeName="cx" values="275;252;275" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="62;90;62" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.45;0.08" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scattered dots — the 42 million -->
  <g fill="#a8c5d8" opacity="0.2">
    <circle cx="60" cy="100" r="1.2">
      <animate attributeName="opacity" values="0.2;0.08;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="210" r="1.0">
      <animate attributeName="opacity" values="0.15;0.06;0.15" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="110" r="1.3">
      <animate attributeName="opacity" values="0.18;0.07;0.18" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="220" r="1.1">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- AI nodes near the gap -->
  <g>
    <circle cx="258" cy="82" r="3.5" fill="#0a1628" stroke="#d4a574" stroke-width="1.2" filter="url(#glow)"/>
    <circle cx="258" cy="82" r="1.8" fill="#d4a574" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="272" cy="96" r="2.8" fill="#0a1628" stroke="#a8c5d8" stroke-width="1" filter="url(#glow)"/>
    <circle cx="272" cy="96" r="1.4" fill="#a8c5d8" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.35;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection between nodes -->
  <path d="M258,82 Q265,89 272,96" stroke="#a8c5d8" stroke-width="0.6" fill="none" opacity="0.18" stroke-dasharray="3,3">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>